services:
  photo-book:
    image: jarod68/photo-book:latest
    build:
        context: .
        platforms:
          - linux/amd64
          - linux/arm64
    ports:
      - "3000:3000"
    volumes:
      - ./photos:/app/photos                   # albums (source of truth on the host)
      - ./public/previews:/app/public/previews # preview cache persisted across restarts
    restart: unless-stopped
