<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Book — Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-admin">

  <header class="admin-header">
    <div class="admin-header-left">
      <a href="/" class="admin-back">← Photo Book</a>
      <h1 class="admin-title">Admin</h1>
    </div>
    <div class="admin-header-right">
      <span id="admin-user" class="admin-username"></span>
      <button id="logout-btn" class="admin-logout-btn">Sign out</button>
    </div>
  </header>

  <main class="admin-main">

    <section class="admin-section" id="section-albums">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Albums</h2>
        <button id="new-album-btn" class="admin-action-btn">+ New album</button>
      </div>
      <form id="new-album-form" class="admin-new-album-form" hidden>
        <input id="new-album-input" class="admin-inline-input" type="text"
               placeholder="Album name" autocomplete="off" spellcheck="false">
        <button type="submit" class="admin-action-btn">Create</button>
        <button type="button" id="new-album-cancel" class="admin-action-btn admin-action-btn--ghost">Cancel</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" id="albums-table">
          <thead>
            <tr>
              <th>Album</th>
              <th class="num">Photos</th>
              <th class="num">Views</th>
              <th class="num">Likes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="albums-body">
            <tr><td colspan="5" class="admin-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section" id="section-users">
      <div class="admin-section-header">
        <h2 class="admin-section-title">Users</h2>
        <button id="new-user-btn" class="admin-action-btn">+ New user</button>
      </div>
      <form id="new-user-form" class="admin-new-album-form" hidden>
        <input id="new-user-username" class="admin-inline-input" type="text"
               placeholder="Username" autocomplete="off" spellcheck="false" style="min-width:140px">
        <input id="new-user-password" class="admin-inline-input" type="password"
               placeholder="Password" autocomplete="new-password" style="min-width:140px">
        <select id="new-user-role" class="admin-role-select">
          <option value="basic">basic</option>
          <option value="admin">admin</option>
        </select>
        <button type="submit" class="admin-action-btn">Create</button>
        <button type="button" id="new-user-cancel" class="admin-action-btn admin-action-btn--ghost">Cancel</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" id="users-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="4" class="admin-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section" id="section-system">
      <h2 class="admin-section-title">System</h2>
      <div id="system-meta" class="admin-system-meta"></div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Container</th>
              <th>Image</th>
              <th>Reference / digest</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="system-body">
            <tr><td colspan="4" class="admin-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section">
      <h2 class="admin-section-title">Top photos</h2>
      <div class="admin-table-wrap">
        <table class="admin-table" id="photos-table">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Album</th>
              <th class="num">Views</th>
              <th class="num">Likes</th>
            </tr>
          </thead>
          <tbody id="photos-body">
            <tr><td colspan="4" class="admin-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Upload modal -->
  <div id="upload-overlay" class="upload-overlay" hidden>
    <div class="upload-modal">
      <div class="upload-modal-header">
        <h3 class="upload-modal-title">Upload to <strong id="upload-album-name"></strong></h3>
        <button id="upload-close-btn" class="upload-close-btn" aria-label="Close">✕</button>
      </div>

      <div id="drop-zone" class="drop-zone">
        <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021
               18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <p class="drop-zone-text">Drop photos here</p>
        <label class="admin-action-btn drop-zone-btn" for="upload-file-input">Add files</label>
        <input id="upload-file-input" type="file" multiple
               accept=".jpg,.jpeg,.png,.webp,.tiff,.tif" hidden>
      </div>

      <ul id="upload-file-list" class="upload-file-list"></ul>

      <div id="upload-progress-wrap" class="upload-progress-wrap" hidden>
        <div class="upload-progress-bar">
          <div id="upload-progress-fill" class="upload-progress-fill"></div>
        </div>
        <span id="upload-progress-text" class="upload-progress-text">0%</span>
      </div>

      <div class="upload-modal-footer">
        <span id="upload-file-count" class="upload-file-count"></span>
        <button id="upload-start-btn" class="admin-action-btn" disabled>Upload</button>
      </div>
    </div>
  </div>

  <!-- Password change modal -->
  <div id="pwd-overlay" class="upload-overlay" hidden>
    <div class="upload-modal pwd-modal">
      <div class="upload-modal-header">
        <h3 class="upload-modal-title">Change password — <strong id="pwd-username"></strong></h3>
        <button id="pwd-close-btn" class="upload-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="pwd-modal-body">
        <input id="pwd-new" class="admin-inline-input" type="password"
               placeholder="New password" autocomplete="new-password">
      </div>
      <div class="upload-modal-footer">
        <span id="pwd-error" class="admin-error pwd-error-text"></span>
        <button id="pwd-save-btn" class="admin-action-btn">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="pages/admin.js"></script>
</body>
</html>
