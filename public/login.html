<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Book — Sign in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-login">
  <div id="lang-switcher"></div>
  <div class="login-card">
    <a href="/" class="login-back" data-i18n="login.back">← Back</a>
    <h1 class="login-logo">Photo Book<span class="login-dot">.</span></h1>

    <form id="login-form" class="login-form" novalidate>
      <div class="login-field">
        <label for="username" class="login-label" data-i18n="login.username">Username</label>
        <input id="username" class="login-input" type="text" autocomplete="username"
               autocapitalize="none" spellcheck="false" required>
      </div>
      <div class="login-field">
        <label for="password" class="login-label" data-i18n="login.password">Password</label>
        <input id="password" class="login-input" type="password" autocomplete="current-password" required>
      </div>
      <p id="login-error" class="login-error" hidden></p>
      <button type="submit" class="login-btn">
        <svg class="login-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 018 0v4"/>
        </svg>
        <span class="login-btn-text" data-i18n="login.submit">Sign in</span>
      </button>
    </form>
  </div>

  <script type="module" src="pages/login.js"></script>
</body>
</html>
